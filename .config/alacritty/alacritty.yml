env:
  WINIT_X11_SCALE_FACTOR: "1"

window:
  padding:
    x: 12
    y: 12

  opacity: 1.0
  dynamic_title: false

font:
  normal:
    family: JetBrains Mono
    style: Regular

  size: 13.0

  offset:
    x: 0
    y: 2

cursor:
  style:
    shape: Block

hints:
  alphabet: "jfkdls;ahgurieowpq"
  enabled:
   - regex: "(ipfs:|ipns:|magnet:|mailto:|gemini:|gopher:|https:|http:|news:|file:|git:|ssh:|ftp:)\
             [^\u0000-\u001F\u007F-\u009F<>\"\\s{-}\\^⟨⟩`]+"
     hyperlinks: true
     command: xdg-open
     post_processing: true
     mouse:
       enabled: true
       mods: None
     binding:
       key: H
       mods: Control|Shift

key_bindings:
  - { key: G, mods: Shift|Control, action: ScrollPageUp }

  # Search mode
  - { key: L, mods: Control, mode: Search, action: SearchClear }
