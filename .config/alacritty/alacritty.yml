# If you cannot set the $TERM variable to 'alacritty' run this:
# curl -sSL https://raw.githubusercontent.com/alacritty/alacritty/master/extra/alacritty.info | tic -x -

env:
  TERM: alacritty
  WINIT_X11_SCALE_FACTOR: "1"

window:
  padding:
    x: 12
    y: 12

  opacity: 1
  dynamic_title: false

font:
  normal:
    family: JetBrains Mono
    style: Regular

  size: 13.0

  offset:
    x: 0
    y: 2

cursor:
  style:
    shape: Block
