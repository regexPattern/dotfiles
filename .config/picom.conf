# vim: ft=config

backend = "glx"

# Shadows
shadow = true;
shadow-radius = 40;
shadow-opacity = .55;
shadow-offset-x = -40;
shadow-offset-y = -20;
shadow-exclude = [
  "_NET_WM_WINDOW_TYPE:a = '_NET_WM_WINDOW_TYPE_NOTIFICATION'",
  "_NET_WM_STATE@:32a *= '_NET_WM_STATE_HIDDEN'",
  "_GTK_FRAME_EXTENTS@:c"
];
shadow-ignore-shaped = false

# Blur
blur:
{
	method = "dual_kawase";
	size = 20;
	deviation = 10.0;
};

wintypes:
{
	tooltip = {
		fade = true;
		shadow = false;
		opacity = 0.75;
		focus = true;
		full-shadow = false;
	};
	dock = {
		shadow = false;
		clip-shadow-above = true;
	};
	dnd = { shadow = false; };
};
