# vim: ft=config

monitor = eDP-1,preferred,1920x0,1
monitor = DP-1,preferred,0x0,1
workspace = eDP-1,1

input {
    kb_file = 
    kb_layout = us
    kb_variant = 
    kb_model = 
    kb_options = 
    kb_rules = 

    follow_mouse = 1

    touchpad {
		disable_while_typing = true
		tap-to-click = true
        natural_scroll = true
    }

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
}

general {
    main_mod = SUPER

    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = 0xff89b4fa
	col.inactive_border = 0xff1e1e2e

    apply_sens_to_raw = 0 # whether to apply the sensitivity to raw input (e.g. used by games where you aim using your mouse)

    damage_tracking = full # leave it on full unless you hate your GPU and want to make it suffer
}

decoration {
    rounding = 0
    blur = 10
    blur_size = 3 # minimum 1
    blur_passes = 1 # minimum 1
    blur_new_optimizations = 1

	drop_shadow = false
	shadow_range = 8
	shadow_render_power = 2
}

animations {
    enabled = true
	bezier=customcurve,0.05,0.9,0.1,1.1

    animation = windows,1,4,default
    animation = border,0,10,default
    animation = fade,1,10,default
    animation = workspaces,1,6,default
}

gestures {
    workspace_swipe = true
	workspace_swipe_fingers = 3
}

windowrulev2 = float,class:dragon

windowrulev2 = workspace 2,class:browser
windowrulev2 = workspace 7,class:Spotify
windowrulev2 = workspace 8,class:obs
windowrulev2 = workspace 9,class:discord

bind = SUPER,RETURN,exec,kitty
bind = SUPERSHIFT,C,killactive,
bind = SUPERSHIFT,Q,exit,
bind = SUPER,F,togglefloating,
bind = SUPER,P,exec,rofi -show drun

bind = SUPER,h,movefocus,l
bind = SUPER,l,movefocus,r
bind = SUPER,k,movefocus,u
bind = SUPER,j,movefocus,d

bind = SUPER,1,workspace,1
bind = SUPER,2,workspace,2
bind = SUPER,3,workspace,3
bind = SUPER,4,workspace,4
bind = SUPER,5,workspace,5
bind = SUPER,6,workspace,6
bind = SUPER,7,workspace,7
bind = SUPER,8,workspace,8
bind = SUPER,9,workspace,9
bind = SUPER,0,workspace,10
bind = SUPER,49,togglespecialworkspace

bind = SUPERSHIFT,1,movetoworkspace,1
bind = SUPERSHIFT,2,movetoworkspace,2
bind = SUPERSHIFT,3,movetoworkspace,3
bind = SUPERSHIFT,4,movetoworkspace,4
bind = SUPERSHIFT,5,movetoworkspace,5
bind = SUPERSHIFT,6,movetoworkspace,6
bind = SUPERSHIFT,7,movetoworkspace,7
bind = SUPERSHIFT,8,movetoworkspace,8
bind = SUPERSHIFT,9,movetoworkspace,9
bind = SUPERSHIFT,0,movetoworkspace,10
bind = SUPERSHIFT,49,movetoworkspace,special

bind = SUPERCTRL,n,workspace,e+1
bind = SUPERCTRL,p,workspace,e-1

# brightness
bind = ,XF86MonBrightnessUp,exec,$HOME/.config/hypr/wob.sh brightness_increase
bind = ,XF86MonBrightnessDown,exec,$HOME/.config/hypr/wob.sh brightness_decrease

# media
bind = ,XF86AudioPlay,exec,playerctl play-pause
bind = ,XF86AudioNext,exec,playerctl next
bind = ,XF86AudioPrev,exec,playerctl previous

# screenshot
bind = ,Print,exec,sh -c 'grim -g "$(slurp)" - | wl-copy'

# volume
bind = ,XF86AudioRaiseVolume,exec,$HOME/.config/hypr/wob.sh volume_increase
bind = ,XF86AudioLowerVolume,exec,$HOME/.config/hypr/wob.sh volume_decrease
bind = ,XF86AudioMute,exec,$HOME/.config/hypr/wob.sh volume_mute

exec-once = hyprpaper
exec-once = mako
exec-once = waybar
exec-once = libinput-gestures-setup start
exec-once = $HOME/.config/hypr/wob.sh init

exec-once=dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
